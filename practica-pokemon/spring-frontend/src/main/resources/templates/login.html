<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PracticaPokemon - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid #ee1515; }
        h2 { color: #333; text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        button:hover { background: #555; }
        .alert { padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; text-align: center; font-size: 0.9rem; }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .footer-link a { color: #ee1515; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Pokédex</h2>

    <div th:if="${param.error}" class="alert alert-error">
        Usuario o contraseña incorrectos.
    </div>

    <div th:if="${param.success}" class="alert alert-success">
        ¡Registro completado! Ya puedes entrar.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" name="username" required autofocus />
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" required />
        </div>
        <button type="submit">Entrar</button>
    </form>

    <div class="footer-link">
        ¿Aún no tienes cuenta? <a href="/register">Regístrate aquí</a>
    </div>
</div>
</body>
</html>
