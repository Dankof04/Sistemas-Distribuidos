<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PracticaPokemon - Registro</title>
    <style>
        /* Reutilizamos estilos por consistencia */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid #3b4cca; }
        h2 { color: #333; text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #3b4cca; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; text-align: center; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .footer-link a { color: #3b4cca; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="register-card">
    <h2>Nuevo Entrenador</h2>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label>Elige un Usuario</label>
            <input type="text" name="username" required />
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" required />
        </div>
        <button type="submit">Crear Cuenta</button>
    </form>

    <div class="footer-link">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
    </div>
</div>
</body>
</html>
